<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <!-- Apparently you need defer when assigning your javascript in head-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="script.js" defer></script>
    <title>Decision Maker Tool</title>
</head>



<body>
      
<h2>Decision Maker Tool</h2>
    <div class="container"> 
        <!-- Options card -->
        <div class="card">
            <h3>Options</h3>
            <div class = "option header">
                <span>Name</span>
                <span>Cost</span>
                <span>Time</span>
                <span>Enjoyment</span>

            </div>
                <div id="options-container">
                    <div class ="option">
                        
                        <input type="text" name="option" placeholder="Option Name">

                        <input type="number" name="cost" placeholder="Cost (1-5)">

                        <input type="number" name="time" placeholder="Time (1-5)">

                        <input type="number"  name="enjoyment" placeholder="Enjoyment (1-5)">
                    </div>
                </div>
            
                <button onclick="addOption()">Add Option</button>
        </div>
        <div class="card">
            <!-- replaces the bare <h3> with this clickable header (aka hiding the advanced weights from users who dont want it) -->
            <div class="weights-header" onclick="toggleWeights()">
                <h3>Importance</h3>
            <span id="weights-toggle-icon">▼</span>
            </div>

            <p class="weights-subtitle">Edit the weight of each factor</p>
         
            <div id="weights-body" style="display:none;">

                <div class="weight-row">
                    <div class="weight-label">
                        <span class="weight-name">Cost</span><br>
                        <span class="weight-note">Lower cost = better</span>
                    </div>
                    <div class="slider-track">
                        <input type="range" id="weight-cost" min="1" max="5" value="3" oninput="updateSliderLabel('cost')">
                        <div class="slider-labels">
                            <span>Not important</span>
                            <span>Very important</span>
                        </div>
                    </div>
                    <span class="slider-value" id="label-cost">3</span>
                </div>
                
                <div class="weight-row">
                    <div class="weight-label">
                        <span class="weight-name">Time</span><br>
                        <span class="weight-note">Less time = better</span>
                    </div>
                    <div class="slider-track">
                        <input type="range" id="weight-time" min="1" max="5" value="3" oninput="updateSliderLabel('time')">
                        <div class="slider-labels">
                            <span>Not important</span>
                            <span>Very important</span>
                        </div>
                    </div>
                    <span class="slider-value" id="label-time">3</span>
                </div>
                
                <div class="weight-row">
                    <div class="weight-label">
                        <span class="weight-name">Enjoyment</span><br>
                        <span class="weight-note">Higher enjoyment = better</span>
                    </div>
                    <div class="slider-track">
                        <input type="range" id="weight-enjoyment" min="1" max="5" value="3" oninput="updateSliderLabel('enjoyment')">
                        <div class="slider-labels">
                            <span>Not important</span>
                            <span>Very important</span>
                        </div>
                    </div>
                    <span class="slider-value" id="label-enjoyment">3</span>
                </div>
            </div>
            
        </div>

        <!-- Decision card -->
        <div class="card">
            <button onclick="calculate()">Make Decision</button>
            
            <div id="computation-container"></div>
        </div>

        <div class="card">
            <div class = "chart-container">
                <div style="width: 100%; max-width: 500px;">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
