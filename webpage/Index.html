<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <!-- Apparently you need defer when assigning your javascript in head-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="script.js" defer></script>
    <title>Decision Maker Tool</title>
</head>



<body>
      
<h2>Decision Maker Tool</h2>
    <div class="container"> 
        <!-- Options card -->
        <div class="card">
            <h3>Options</h3>
            <div class = "option header">
                <span>Name</span>
                <span>Cost</span>
                <span>Time</span>
                <span>Enjoyment</span>
                <span>Importance</span>

            </div>
                <div id="options-container">
                    <div class ="option">
                        
                        <input type="text" name="option" placeholder="Option Name">

                        <input type="number" name="cost" placeholder="Cost (1-5)">

                        <input type="number" name="time" placeholder="Time (1-5)">

                        <input type="number"  name="enjoyment" placeholder="Enjoyment (1-5)">

                        <input type="number" name="importance" placeholder="Importance (1-5)">
                    </div>
                </div>
            
                <button onclick="addOption()">Add Option</button>
        </div>
        <!-- Decision card -->
        <div class="card">
            <button onclick="calculate()">Make Decision</button>
            
            <div id="computation-container"></div>
        </div>

        <div class="card">
            <div class = "chart-container">
                <div style="width: 100%; max-width: 500px;">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
